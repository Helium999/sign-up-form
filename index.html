<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-div"></div>
        <div class="right-div">
            <div class="form-div">
                <svg width="120px" height="120px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" 
                stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" 
                d="M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12ZM15 9C15 10.6569 13.6569 12 12 12C10.3431 12 9 10.6569 9 9C9 7.34315 10.3431 6 12 6C13.6569 6 15 7.34315 15 9ZM12 20.5C13.784 20.5 15.4397 19.9504 16.8069 19.0112C17.4108 18.5964 17.6688 17.8062 17.3178 17.1632C16.59 15.8303 15.0902 15 11.9999 15C8.90969 15 7.40997 15.8302 6.68214 17.1632C6.33105 17.8062 6.5891 18.5963 7.19296 19.0111C8.56018 19.9503 10.2159 20.5 12 20.5Z" 
                fill="#404040"></path> </g></svg>
                <div class="form-headings">
                    <h1>Create an account.</h1>
                    <div class="login">
                        <p>Already have an account?</p>
                        <a href="#">Log in</a>
                    </div>
                </div>
                <form>
                    <p>
                    <input id="first-name" name="first-name" aria-label="First Name" placeholder="FIRST NAME">
                    <span class="icon"></span>
                    </p>

                    <p>
                    <input id="last-name" name="last-name" aria-label="Last Name" placeholder="LAST NAME">
                    <span class="icon"></span>
                    </p>

                    <p>
                    <input id="email" type="email" name="email" aria-label="Email" placeholder="EMAIL ID">
                    <span class="icon"></span>
                    </p>

                    <p>
                    <input id="pwd" type="password" name="pwd" aria-label="Password" placeholder="PASSWORD">
                    <span class="icon"></span>
                    </p>

                    <p>
                    <input id="confirm-pwd" type="password" name="confirm-pwd" aria-label="Confirm Password" placeholder="CONFIRM PASSWORD">
                    <span class="icon"></span>
                    </p>

                    <button type="submit">Sign up.</button>
                </form>
                
                <p class="tnc">By signing up,&nbsp;
                    you agree to the&nbsp;
                    <a href="#">Privacy Policy</a>&nbsp; and&nbsp;
                    <a href="#">Terms of Use</a> .
                </p>
            </div>
        </div>
    </div>
</body>
</html>
